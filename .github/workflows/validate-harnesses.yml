name: Validate Harnesses

on:
  push:
    paths:
      - 'harnesses/**'
      - 'templates/**'
      - 'tests/**'
      - 'scripts/**'
      - 'lib/**'
      - 'bin/**'
  pull_request:
    paths:
      - 'harnesses/**'
      - 'lib/**'
      - 'bin/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run harness validation
        run: npm test

      - name: Check descriptions follow trigger-first pattern
        run: npm run check-descriptions

      - name: Count harnesses
        run: |
          count=$(find harnesses -name "HARNESS.md" 2>/dev/null | wc -l)
          echo "Total harnesses: $count"
          echo "harness_count=$count" >> "$GITHUB_ENV"

      - name: Update README badge (master branch only)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          node scripts/update-stats.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update harness/agent count badges [skip ci]" && git push)
